# Deploys the Azure Functions backend (FabOps.Api).
#
# One-time setup:
#   1. Create the Function App (Flex Consumption recommended; .NET 8 isolated).
#   2. Repo Settings → Secrets and variables → Actions:
#        secret  AZURE_FUNCTIONAPP_PUBLISH_PROFILE = the app's publish profile XML
#        variable AZURE_FUNCTIONAPP_NAME           = the Function App name
#
# Visual Studio's right-click Publish on FabOps.Api works as well — this workflow
# is the CI/CD equivalent.

name: Deploy API (Azure Functions)

on:
  # Auto-deploy on push is disabled to prevent failed runs — deploys are done manually via the
  # Functions Core Tools. To enable CI/CD, set the AZURE_FUNCTIONAPP_PUBLISH_PROFILE secret and
  # the AZURE_FUNCTIONAPP_NAME variable (see above), then restore the push trigger here.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test tests/FabOps.Tests/FabOps.Tests.csproj --configuration Release

      - name: Publish
        run: dotnet publish src/FabOps.Api/FabOps.Api.csproj --configuration Release --output ./publish

      - name: Deploy
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
